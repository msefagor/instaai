<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Promptla</title>
<style>
 :root{--bg:#000;--sur:#0d0d0f;--alt:#1a1a1d;--bd:#262626;--txt:#fff;--sec:#a8a8a8;--pur:#7C5CFF;--blu:#3BC9FF;--red:#ed4956}
 *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
 body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px}
 .app{max-width:520px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
 svg{width:24px;height:24px;display:block}
 .acc{background:linear-gradient(135deg,var(--pur),var(--blu))}
 header{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:12px 16px;z-index:8}
 .logo{font-family:"Segoe Script","Bradley Hand",cursive;font-size:26px;font-weight:700;background:linear-gradient(135deg,#f09433,#dc2743,#bc1888);-webkit-background-clip:text;background-clip:text;color:transparent}
 .hicons{display:flex;gap:18px;align-items:center;color:#fff}
 .hicons span{cursor:pointer}
 main{flex:1;padding-bottom:64px}
 /* stories */
 .stories{display:flex;gap:14px;overflow-x:auto;padding:12px 14px;border-bottom:1px solid var(--bd)}
 .stories::-webkit-scrollbar{display:none}
 .story{flex:0 0 auto;width:64px;text-align:center;cursor:pointer}
 .ring{width:62px;height:62px;border-radius:50%;padding:2px;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
 .ring.me{background:var(--bd)}
 .ring .av{width:100%;height:100%;border-radius:50%;background:var(--alt);border:2px solid #000;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;overflow:hidden}
 .story .nm{font-size:11px;color:var(--sec);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
 .plus{position:absolute;right:-2px;bottom:-2px;width:20px;height:20px;border-radius:50%;background:#0095f6;border:2px solid #000;color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center}
 /* post */
 .post{border-bottom:1px solid var(--bd)}
 .phead{display:flex;align-items:center;gap:10px;padding:10px 14px}
 .pav{width:34px;height:34px;border-radius:50%;background:var(--alt);display:flex;align-items:center;justify-content:center;font-size:14px}
 .pav.r{padding:2px;background:linear-gradient(45deg,#f09433,#dc2743,#bc1888)}
 .pav.r div{width:100%;height:100%;border-radius:50%;background:var(--alt);display:flex;align-items:center;justify-content:center;border:2px solid #000}
 .pname{font-weight:600;font-size:13px}
 .pimg{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--alt)}
 .pact{display:flex;align-items:center;gap:16px;padding:10px 14px 6px;color:#fff}
 .pact .bm{margin-left:auto}
 .pact span{cursor:pointer;display:flex}
 .plikes{padding:0 14px;font-weight:600;font-size:13px}
 .pcap{padding:4px 14px 2px;font-size:13px}
 .pcom{padding:2px 14px;color:var(--sec);font-size:13px;cursor:pointer}
 .ptime{padding:2px 14px 12px;color:var(--sec);font-size:11px;text-transform:uppercase}
 .ailbl{display:inline-flex;align-items:center;gap:4px;background:rgba(124,92,255,.15);border:1px solid var(--pur);color:#cfc6ff;border-radius:6px;padding:1px 6px;font-size:10px;margin-left:6px;vertical-align:middle}
 /* bottom nav */
 .bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;height:60px;background:#000;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-around;z-index:9}
 .bnav .it{cursor:pointer;color:#fff;opacity:.65;display:flex;align-items:center}
 .bnav .it.on{opacity:1}
 .bnav .pa{width:28px;height:28px;border-radius:50%;background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);display:flex;align-items:center;justify-content:center}
 .navav{width:26px;height:26px;border-radius:50%;background:var(--alt);display:flex;align-items:center;justify-content:center;font-size:12px;border:1px solid #444}
 /* grid */
 .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;padding:2px}
 .grid img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--alt)}
 .empty{padding:50px 24px;text-align:center;color:var(--sec)}
 /* profile */
 .phdr{padding:18px 16px;display:flex;align-items:center;gap:22px}
 .pbig{width:84px;height:84px;border-radius:50%;background:var(--alt);display:flex;align-items:center;justify-content:center;font-size:32px}
 .stat{display:flex;gap:26px}
 .stat .s{text-align:center}.stat .s b{font-size:17px}.stat .s div{font-size:12px;color:var(--sec)}
 .pbio{padding:0 16px 14px}
 .pbtns{display:flex;gap:8px;padding:0 16px 14px}
 .pbtns button{flex:1;height:34px;border-radius:9px;border:0;background:var(--alt);color:#fff;font-weight:600;cursor:pointer}
 /* create */
 .wrap2{padding:14px 16px}
 .srcbox{width:100%;aspect-ratio:1/1;border-radius:14px;background:var(--alt);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer}
 .srcbox img{width:100%;height:100%;object-fit:cover}
 .srcbox .hint{color:var(--sec);text-align:center;padding:20px}
 .seg{display:flex;gap:10px;margin:12px 0}
 .seg button{flex:1;height:46px;border-radius:12px;border:0;background:var(--alt);color:#fff;font-weight:600;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
 label.l{display:block;color:var(--sec);font-size:13px;margin:14px 2px 6px}
 textarea,input,select{width:100%;background:var(--alt);border:0;border-radius:12px;color:#fff;padding:12px;font-size:15px;font-family:inherit}
 textarea{min-height:80px;resize:vertical}
 .enh{display:flex;justify-content:flex-end;margin-top:6px}
 .enh button{background:none;border:0;color:var(--blu);font-size:13px;cursor:pointer}
 .styles{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
 .sty{padding:8px 14px;border-radius:20px;background:var(--alt);color:#fff;font-size:13px;cursor:pointer;border:0}
 .sty.on{background:var(--pur)}
 .gen{width:100%;height:52px;border:0;border-radius:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:18px}
 .gen:disabled{opacity:.5}
 .note{color:var(--sec);font-size:11px;text-align:center;margin-top:10px}
 .ba{display:flex;gap:8px;margin-top:12px}.ba .c{flex:1;text-align:center}.ba img{width:100%;height:96px;object-fit:cover;border-radius:10px}.ba .t{font-size:11px;color:var(--sec);margin-top:4px}
 .ract{display:flex;gap:10px;margin-top:14px}.ract button{flex:1;height:46px;border-radius:12px;border:0;color:#fff;font-weight:600;cursor:pointer}
 .disc{background:var(--alt);border-radius:10px;padding:10px;font-size:11px;color:var(--sec);margin-top:12px}
 /* overlays */
 .ov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:flex-end;justify-content:center;z-index:30}
 .ov.show{display:flex}
 .sheet{width:100%;max-width:520px;background:var(--sur);border-radius:18px 18px 0 0;padding:18px;max-height:90dvh;overflow:auto}
 .sheet h3{margin-bottom:10px;font-size:17px}
 .row{display:flex;gap:10px;margin-top:12px}
 .row .primary{height:46px;border-radius:12px;border:0;color:#fff;font-weight:700;flex:1;cursor:pointer}
 .row .ghost{height:46px;border-radius:12px;border:1px solid #333;background:none;color:#fff;flex:1;cursor:pointer}
 .warn{background:rgba(237,73,86,.12);border:1px solid rgba(237,73,86,.4);color:#ffb3bd;border-radius:10px;padding:10px;font-size:12px;margin-top:10px}
 .testbtn{width:100%;height:44px;border-radius:12px;border:1px solid var(--blu);background:none;color:var(--blu);font-weight:600;cursor:pointer;margin-top:12px}
 #testout{font-size:12px;margin-top:10px;white-space:pre-wrap;color:var(--sec)}
 a{color:var(--blu)}
 #cam{position:fixed;inset:0;background:#000;display:none;flex-direction:column;z-index:40}
 #cam video{flex:1;width:100%;object-fit:cover}
 #cam .bar{display:flex;align-items:center;justify-content:space-around;padding:22px}
 #cam .sh{width:68px;height:68px;border-radius:50%;background:#fff;border:5px solid var(--pur);cursor:pointer}
 #cam .tb{color:#fff;background:rgba(255,255,255,.15);border:0;padding:10px 14px;border-radius:10px;cursor:pointer}
 .spin{width:42px;height:42px;border:4px solid var(--alt);border-top-color:var(--pur);border-radius:50%;animation:sp 1s linear infinite}
 @keyframes sp{to{transform:rotate(360deg)}}
 .center{display:flex;flex-direction:column;align-items:center;gap:14px;padding:60px 0}
 #toast{position:fixed;left:50%;bottom:78px;transform:translateX(-50%);background:#1a1a1d;border:1px solid #333;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;z-index:60;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%;text-align:center}
 #toast.show{opacity:1}
 .reel{height:calc(100dvh - 64px);scroll-snap-align:start;position:relative;display:flex;align-items:center;justify-content:center;background:#000}
 .reel img{width:100%;height:100%;object-fit:cover}
 .reelmeta{position:absolute;left:14px;bottom:20px;right:60px}
 #reels{height:calc(100dvh - 64px);overflow-y:auto;scroll-snap-type:y mandatory}
</style>
</head>
<body>
<div class="app">
  <header id="hdr"></header>
  <main id="main"></main>
</div>
<nav class="bnav" id="bnav"></nav>

<div id="cam">
  <video id="camvid" autoplay playsinline muted></video>
  <div class="bar"><button class="tb" onclick="closeCam()">Kapat</button><div class="sh" onclick="capture()"></div><button class="tb" onclick="flipCam()">Çevir</button></div>
</div>

<div class="ov" id="settings"><div class="sheet">
  <h3>Ayarlar</h3>
  <label class="l">Gemini API anahtarı</label>
  <input id="keyInput" type="password" placeholder="AIza... (AI Studio anahtarı)" autocomplete="off">
  <label class="l">Görsel modeli</label>
  <input id="modelInput" type="text" placeholder="gemini-2.5-flash-image">
  <button class="testbtn" onclick="testConn()">Bağlantıyı test et</button>
  <div id="testout"></div>
  <div class="warn">Anahtar yalnızca bu cihazda saklanır; koda/GitHub'a yazılmaz. Anahtarınız <b>AIza...</b> ile başlamalıdır (AI Studio). Almak için: <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com/apikey</a></div>
  <div class="row"><button class="ghost" onclick="closeSettings()">Kapat</button><button class="primary acc" onclick="saveSettings()">Kaydet</button></div>
</div></div>

<input id="fileinp" type="file" accept="image/*" capture="user" style="display:none">
<div id="toast"></div>

 gear:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 13a7.8 7.8 0 0 0 0-2l2-1.5-2-3.4-2.4 1a7.5 7.5 0 0 0-1.7-1L14.9 3H9.1l-.4 2.6a7.5 7.5 0 0 0-1.7 1l-2.4-1-2 3.4L4.6 11a7.8 7.8 0 0 0 0 2l-2 1.5 2 3.4 2.4-1a7.5 7.5 0 0 0 1.7 1l.4 2.6h5.8l.4-2.6a7.5 7.5 0 0 0 1.7-1l2.4 1 2-3.4z"/></svg>',
 cam:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M3 8a2 2 0 0 1 2-2h2l1.4-2h7L17 6h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><circle cx="12" cy="12.5" r="3.4"/></svg>'
};
var STYLES=[["cinematic","Sinematik"],["cyberpunk","Cyberpunk"],["anime","Anime"],["historical","Tarihi"],["professional","Profesyonel"],["luxury","Lüks"],["fantasy","Fantastik"],["nature","Doğa"]];
var SD={cinematic:"cinematic film still, dramatic three-point lighting, shallow depth of field, 35mm anamorphic lens, teal-and-orange grade, volumetric light, film grain, ultra-detailed, 8k",cyberpunk:"cyberpunk megacity at night, neon signage, rain-soaked reflective streets, cyan-magenta rim light, fog, high contrast, cinematic, ultra-detailed",anime:"high-quality anime illustration, clean line art, cel shading, vibrant colors, soft studio lighting, detailed background",historical:"classical Ottoman-era oil portrait, ornate period attire, warm Rembrandt lighting, museum-quality brushwork",professional:"professional studio headshot, clean neutral background, soft key light, 85mm lens, sharp focus, natural skin tones",luxury:"luxury fashion editorial, studio strobe lighting, elegant composition, glossy magazine aesthetic, refined grade",fantasy:"epic fantasy scene, cinematic god rays, painterly detail, dramatic composition, ultra-detailed",nature:"cinematic documentary look, natural golden-hour light, wide-angle depth, true-to-life colors"};

var nav="feed", cstep="pick", captured=null, resultUrl=null, facing="user", camStream=null, busy=false, triedResolve=false;
var cur={prompt:"",style:"cinematic"};
function $(id){return document.getElementById(id);}
function getKey(){return localStorage.getItem(KEY_K)||"";}
function getModel(){return localStorage.getItem(MODEL_K)||DEF_MODEL;}
function toast(m){var t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show");},3200);}

function seedPosts(){return [
 {id:"s1",user:"ayse_art",img:SEED.cyberpunk,cap:"Gece şehri 🌃 #cyberpunk",likes:128,liked:false,saved:false,time:"2 saat",mine:false,comments:[["zeynep","Harika!"],["mehmet.k","Bu promptu istiyorum"]]},
 {id:"s2",user:"mehmet.k",img:SEED.cinematic,cap:"#cinematic portre denemesi",likes:86,liked:false,saved:false,time:"5 saat",mine:false,comments:[["demo","Renkler süper"]]},
 {id:"s3",user:"zeynep",img:SEED.anime,cap:"#anime moda çekimi ✨",likes:203,liked:false,saved:false,time:"1 gün",mine:false,comments:[["ayse_art","Stil tam isabet"]]}
];}
function loadPosts(){try{var p=JSON.parse(localStorage.getItem(POSTS_K));if(p&&p.length)return p;}catch(e){}var s=seedPosts();savePosts(s);return s;}
function savePosts(p){localStorage.setItem(POSTS_K,JSON.stringify(p));}
var POSTS=loadPosts();

/* settings */
function openSettings(){$("keyInput").value=getKey();$("modelInput").value=getModel();$("testout").textContent="";$("settings").classList.add("show");}
function closeSettings(){$("settings").classList.remove("show");}
function saveSettings(){var k=$("keyInput").value.trim(),m=$("modelInput").value.trim()||DEF_MODEL;if(k)localStorage.setItem(KEY_K,k);else localStorage.removeItem(KEY_K);localStorage.setItem(MODEL_K,m);closeSettings();toast("Ayarlar kaydedildi");}
async function testConn(){
 var key=$("keyInput").value.trim()||getKey();
 var out=$("testout");
 if(!key){out.textContent="Önce bir anahtar girin.";return;}
 if(!key.indexOf){}
 out.textContent="Test ediliyor…";
 if(key.slice(0,4)!=="AIza"){out.textContent="⚠ Anahtar 'AIza' ile başlamıyor — bu büyük olasılıkla bir AI Studio API anahtarı değil. Yine de deneniyor…\n";}
 try{
  var r=await fetch("https://generativelanguage.googleapis.com/v1beta/models",{headers:{"x-goog-api-key":key}});
  var d=await r.json();
  if(!r.ok)throw new Error((d.error&&d.error.message)||("HTTP "+r.status));
  var names=(d.models||[]).map(function(m){return m.name.replace("models/","");});
  var imgs=names.filter(function(n){return n.indexOf("image")>=0;});
  if(imgs.length){$("modelInput").value=imgs[0];}
  out.textContent="✓ Bağlantı başarılı. "+names.length+" model bulundu.\nGörsel modeli: "+(imgs[0]||"bulunamadı — hesabınızda görsel modeli etkin değil")+(imgs.length?" (otomatik seçildi)":"");
 }catch(e){ out.textContent="✗ Bağlantı yok: "+e.message+"\n→ Geçerli bir AIza... anahtarı girin (aistudio.google.com/apikey)."; }
}

/* camera */
function openCam(){$("cam").style.display="flex";if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){navigator.mediaDevices.getUserMedia({video:{facingMode:facing},audio:false}).then(function(s){camStream=s;$("camvid").srcObject=s;}).catch(function(){closeCam();$("fileinp").click();});}else{closeCam();$("fileinp").click();}}
function stopCam(){if(camStream){camStream.getTracks().forEach(function(t){t.stop();});camStream=null;}}
function closeCam(){stopCam();$("cam").style.display="none";}
function flipCam(){facing=(facing==="user")?"environment":"user";stopCam();openCam();}
function capture(){var v=$("camvid"),c=document.createElement("canvas");c.width=v.videoWidth||720;c.height=v.videoHeight||720;c.getContext("2d").drawImage(v,0,0,c.width,c.height);captured=c.toDataURL("image/jpeg",0.9);resultUrl=null;closeCam();go("create");cstep="pick";render();}
$("fileinp").addEventListener("change",function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(){captured=r.result;resultUrl=null;go("create");cstep="pick";render();};r.readAsDataURL(f);});

/* prompt */
function buildPrompt(){var b=(cur.prompt||"").trim();var d=SD[cur.style]||"";return "Edit the provided photo of the person. Preserve the subject's identity, facial features and body. "+(b?b+". ":"")+d+", highly detailed, professional quality.";}
function localEnhance(t,s){var x=(t||"bu fotoğrafı dönüştür").trim().replace(/\.$/,"");return "Kullanıcının yüz ve kimliğini koruyarak, "+x+"; "+(SD[s]||SD.cinematic)+"; kompozisyon dengeli, ışık profesyonel, yüksek çözünürlük, fotogerçekçi kalite.";}
async function geminiText(p){var key=getKey();if(!key)throw new Error("no-key");var r=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent",{method:"POST",headers:{"Content-Type":"application/json","x-goog-api-key":key},body:JSON.stringify({contents:[{parts:[{text:p}]}]})});var d=await r.json();if(!r.ok)throw new Error((d.error&&d.error.message)||("HTTP "+r.status));var parts=(((d.candidates||[])[0]||{}).content||{}).parts||[];var txt=parts.map(function(x){return x.text||"";}).join("").trim();if(!txt)throw new Error("empty");return txt;}
async function enhance(){var ta=$("promptEl");var u=ta.value.trim();toast("Prompt geliştiriliyor…");var instr="Asagidaki istegi, bir kisinin fotografini AI ile donusturmek icin tek bir profesyonel GORSEL URETIM PROMPTUNA cevir. Kisinin kimligini ve yuz hatlarini koru. Isik, lens, kompozisyon, renk derecelendirme ve atmosfer detaylari ekle. Stil: "+cur.style+". Sadece nihai promptu Turkce yaz. Istek: "+(u||"bu fotografi donustur");try{var o=await geminiText(instr);ta.value=o;cur.prompt=o;toast("Profesyonel prompt hazır ✨");}catch(e){ta.value=localEnhance(u,cur.style);cur.prompt=ta.value;toast(String(e.message)==="no-key"?"Anahtar yok — yerel profesyonel şablon":"Çevrimdışı şablon kullanıldı");}}

/* generation */
function imgPart(d){for(var i=0;i<(d.candidates||[]).length;i++){var ps=((d.candidates[i].content||{}).parts)||[];for(var j=0;j<ps.length;j++){var inl=ps[j].inline_data||ps[j].inlineData;if(inl&&inl.data)return{data:inl.data,mime:inl.mime_type||inl.mimeType||"image/png"};}}return null;}
async function callImage(model,b64,mime,key){var r=await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent",{method:"POST",headers:{"Content-Type":"application/json","x-goog-api-key":key},body:JSON.stringify({contents:[{parts:[{text:buildPrompt()},{inline_data:{mime_type:mime,data:b64}}]}],generationConfig:{responseModalities:["IMAGE"]}})});var d=await r.json();if(!r.ok)throw new Error((d.error&&d.error.message)||("HTTP "+r.status));var img=imgPart(d);if(!img)throw new Error("Yanıtta görsel yok (model görsel üretmiyor olabilir).");return "data:"+img.mime+";base64,"+img.data;}
async function resolveImageModel(key){var r=await fetch("https://generativelanguage.googleapis.com/v1beta/models",{headers:{"x-goog-api-key":key}});var d=await r.json();if(!r.ok)return null;var n=(d.models||[]).map(function(m){return m.name.replace("models/","");}).filter(function(x){return x.indexOf("image")>=0;});return n[0]||null;}
async function generate(){
 if(busy)return;
 if(!captured){toast("Önce bir fotoğraf çekin/seçin");return;}
 var key=getKey();
 if(!key){openSettings();toast("Önce Gemini API anahtarınızı girin");return;}
 busy=true;cstep="loading";render();
 var b64=captured.split(",")[1],mime=captured.substring(5,captured.indexOf(";"))||"image/jpeg";
 try{
  try{ resultUrl=await callImage(getModel(),b64,mime,key); }
  catch(e1){
    if(!triedResolve){ triedResolve=true; var m=await resolveImageModel(key); if(m&&m!==getModel()){ localStorage.setItem(MODEL_K,m); resultUrl=await callImage(m,b64,mime,key); } else { throw e1; } }
    else { throw e1; }
  }
  cstep="result";
 }catch(e){ cstep="pick"; toast("Üretim hatası: "+e.message); }
 finally{ busy=false; render(); }
}
function shareToFeed(){
 if(!resultUrl)return;
 POSTS.unshift({id:"u"+Date.now(),user:"sen",img:resultUrl,cap:(cur.prompt||"AI dönüşüm").slice(0,80),likes:0,liked:false,saved:false,time:"şimdi",mine:true,comments:[]});
 savePosts(POSTS); captured=null;resultUrl=null;cur.prompt="";cstep="pick";go("feed");toast("Paylaşıldı 🎉");
}
function downloadResult(){if(!resultUrl)return;var a=document.createElement("a");a.href=resultUrl;a.download="promptla.png";a.click();}

/* interactions */
function like(id){var p=POSTS.find(function(x){return x.id===id;});if(!p)return;p.liked=!p.liked;p.likes+=p.liked?1:-1;savePosts(POSTS);render();}
function save(id){var p=POSTS.find(function(x){return x.id===id;});if(!p)return;p.saved=!p.saved;savePosts(POSTS);render();}
function go(t){nav=t;render();window.scrollTo(0,0);}

/* render */
function hdr(){
 var right='<span onclick="openSettings()" title="Ayarlar">'+I.gear+'</span><span onclick="toast(\'Bildirimler yakında\')">'+I.heart+'</span>';
 if(nav==="profile") return '<div style="font-weight:700;font-size:16px">sen</div><div class="hicons">'+right+'</div>';
 if(nav==="create") return '<div style="font-weight:700;font-size:16px">Yeni gönderi</div><div class="hicons">'+right+'</div>';
 return '<div class="logo">Promptla</div><div class="hicons">'+right+'</div>';
}
function storiesHtml(){
 var people=[["Sen",true],["ayse_art",false],["mehmet.k",false],["zeynep",false],["burak",false],["elif",false]];
 var h='<div class="stories">';
 people.forEach(function(p){
  h+='<div class="story" onclick="'+(p[1]?'openCam()':'toast(\'Hikaye yakında\')')+'"><div style="position:relative"><div class="ring '+(p[1]?'me':'')+'"><div class="av">'+(p[1]?I.plus.replace(/#fff/g,"#7C5CFF"):p[0][0].toUpperCase())+'</div></div></div><div class="nm">'+p[0]+'</div></div>';
 });
 return h+'</div>';
}
function postHtml(p){
 return '<div class="post"><div class="phead"><div class="pav r"><div>'+p.user[0].toUpperCase()+'</div></div><div class="pname">'+p.user+'</div>'
  +'<span class="ailbl">✦ AI</span><div style="margin-left:auto;color:#fff">···</div></div>'
  +'<img class="pimg" src="'+p.img+'">'
  +'<div class="pact"><span onclick="like(\''+p.id+'\')">'+(p.liked?I.heartF:I.heart)+'</span><span onclick="toast(\'Yorumlar\')">'+I.comment+'</span><span onclick="toast(\'Paylaş\')">'+I.share+'</span><span class="bm" onclick="save(\''+p.id+'\')">'+(p.saved?I.bmF:I.bm)+'</span></div>'
  +'<div class="plikes">'+p.likes.toLocaleString("tr-TR")+' beğenme</div>'
  +'<div class="pcap"><b>'+p.user+'</b> '+p.cap+'</div>'
  +(p.comments&&p.comments.length?'<div class="pcom">'+p.comments.length+' yorumun tümünü gör</div>':'')
  +'<div class="ptime">'+p.time+'</div></div>';
}
function render(){
 $("hdr").innerHTML=hdr();
 var m=$("main"),h="";
 if(nav==="feed"){ h=storiesHtml(); POSTS.forEach(function(p){h+=postHtml(p);}); }
 else if(nav==="explore"){ h='<div class="grid">'; POSTS.concat(seedPosts()).forEach(function(p){h+='<img src="'+p.img+'" onclick="go(\'feed\')">';}); h+='</div>'; }
 else if(nav==="reels"){ h='<div id="reels">'; POSTS.forEach(function(p){h+='<div class="reel"><img src="'+p.img+'"><div class="reelmeta"><div style="font-weight:700">'+p.user+' <span class="ailbl">✦ AI</span></div><div style="font-size:13px;margin-top:4px">'+p.cap+'</div></div></div>';}); h+='</div>'; }
 else if(nav==="profile"){
  var mine=POSTS.filter(function(p){return p.mine;});
  h='<div class="phdr"><div class="pbig">S</div><div class="stat"><div class="s"><b>'+mine.length+'</b><div>gönderi</div></div><div class="s"><b>128</b><div>takipçi</div></div><div class="s"><b>2</b><div>takip</div></div></div></div>'
   +'<div class="pbio"><b>Sefa</b><div style="color:var(--sec);font-size:13px">@sen · AI ile üretiyorum ✦</div></div>'
   +'<div class="pbtns"><button onclick="go(\'create\')">İçerik üret</button><button onclick="openSettings()">Ayarlar</button></div>';
  if(mine.length){ h+='<div class="grid">'; mine.forEach(function(p){h+='<img src="'+p.img+'">';}); h+='</div>'; }
  else { h+='<div class="empty">Henüz gönderin yok.<br>Ortadaki + ile ilk AI içeriğini üret.</div>'; }
 }
 else if(nav==="create"){ h=createHtml(); }
 m.innerHTML=h;
 if(nav==="create"&&cstep==="pick"){var ta=$("promptEl");if(ta)ta.value=cur.prompt||"";}
 renderNav();
}
function createHtml(){
 if(cstep==="loading") return '<div class="center"><div class="spin"></div><div style="color:var(--sec)">Gemini ile üretiliyor…</div><div style="color:var(--sec);font-size:12px">Çektiğin fotoğraf dönüştürülüyor</div></div>';
 if(cstep==="result") return '<div class="wrap2"><div style="position:relative"><img src="'+resultUrl+'" style="width:100%;border-radius:14px"><span class="ailbl" style="position:absolute;left:10px;top:10px">✦ AI ile üretildi</span></div>'
  +'<div class="ba"><div class="c"><img src="'+captured+'"><div class="t">Önce (çektiğin)</div></div><div class="c"><img src="'+resultUrl+'"><div class="t">Sonra (AI)</div></div></div>'
  +'<div class="ract"><button class="acc" onclick="shareToFeed()">Paylaş</button><button style="background:var(--alt)" onclick="downloadResult()">İndir</button></div>'
  +'<div class="disc">Bu içerik yapay zekâ ile üretilmiştir. Gerçek olay/kanıt olarak sunulmamalıdır.</div>'
  +'<button class="gen" style="background:var(--alt)" onclick="cstep=\'pick\';render()">Yeniden üret</button></div>';
 var h='<div class="wrap2"><div class="srcbox" onclick="openCam()">';
 if(captured) h+='<img src="'+captured+'"><span class="ailbl" style="position:absolute;left:10px;top:10px">Çekilen fotoğraf</span>';
 else h+='<div class="hint">'+I.cam.replace(/currentColor/g,"#888")+'<br>Kameraya dokun, fotoğraf çek<br><span style="font-size:12px">veya galeriden seç</span></div>';
 h+='</div>';
 h+='<div class="seg"><button onclick="openCam()">'+I.cam+' Fotoğraf çek</button><button onclick="document.getElementById(\'fileinp\').click()">Galeriden seç</button></div>';
 h+='<label class="l">Prompt</label><textarea id="promptEl" placeholder="Örn: Beni sinematik bir bilim kurgu sahnesine dönüştür" oninput="cur.prompt=this.value"></textarea><div class="enh"><button onclick="enhance()">✦ Promptu geliştir</button></div>';
 h+='<label class="l">Hazır stiller</label><div class="styles">';
 STYLES.forEach(function(s){h+='<button class="sty'+(cur.style===s[0]?' on':'')+'" onclick="cur.style=\''+s[0]+'\';render()">'+s[1]+'</button>';});
 h+='</div><button class="gen acc" onclick="generate()"'+(busy?' disabled':'')+'>Üret</button><div class="note">Çektiğin fotoğraf Gemini ile dönüştürülür. Anahtar için ⚙ Ayarlar.</div></div>';
 return h;
}
function renderNav(){
 var items=[["feed",I.home],["explore",I.search],["create",null],["reels",I.reels],["profile",null]];
 $("bnav").innerHTML=items.map(function(it){
  if(it[0]==="create")return '<div class="it" onclick="captured=null;resultUrl=null;cstep=\'pick\';go(\'create\')"><div class="pa">'+I.plus+'</div></div>';
  if(it[0]==="profile")return '<div class="it '+(nav==="profile"?"on":"")+'" onclick="go(\'profile\')"><div class="navav">S</div></div>';
  return '<div class="it '+(nav===it[0]?"on":"")+'" onclick="go(\''+it[0]+'\')">'+it[1]+'</div>';
 }).join("");
}
window.addEventListener("load",function(){render();if(!getKey()){setTimeout(function(){openSettings();toast("Başlamak için Gemini API anahtarını gir (AIza...)");},500);}});
</script>
